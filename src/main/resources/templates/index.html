<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Index</title>
    <link rel="stylesheet" th:href="@{/vendor/font-awesome/css/font-awesome.min.css}">
    <link rel="stylesheet" th:href="@{/css/commons.css}">
    <script th:src="@{/vendor/tailwind/tailwind.min.js}"></script>
</head>
<body class="bg-zinc-950 text-white min-h-screen min-w-[400px]">

    <!-- Header -->
    <header class="sticky top-0 z-10 bg-zinc-950/90 backdrop-blur-sm border-b border-zinc-800">
        <div class="max-w-screen-xl mx-auto px-6 h-16 flex items-center justify-between gap-4">
            <div class="flex items-center gap-4 flex-1 min-w-0">
                <span class="text-lg font-bold tracking-tight shrink-0">Index</span>
                <div class="relative w-full max-w-xs">
                    <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-sm text-zinc-500 pointer-events-none"></i>
                    <input id="search"
                           type="text"
                           placeholder="프로젝트 검색..."
                           autocomplete="off"
                           class="w-full bg-zinc-800 border border-zinc-700 rounded-lg pl-9 pr-4 py-2 text-sm placeholder-zinc-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500"
                           aria-label="프로젝트 검색">
                </div>
            </div>
            <div class="shrink-0 flex items-center">
                <a href="https://github.com/antop-dev/index"
                   target="_blank"
                   rel="noopener noreferrer"
                   class="flex items-center gap-1 px-2 text-zinc-400 hover:text-white transition-colors text-sm">
                    <i class="fa-brands fa-github"></i>
                    <span class="nav-label">GitHub</span>
                </a>
                <a href="mailto:antop@kakao.com"
                   class="flex items-center gap-1 px-2 text-zinc-400 hover:text-white transition-colors text-sm">
                    <i class="fa-solid fa-envelope"></i>
                    <span class="nav-label">Email</span>
                </a>
                <a href="https://ko-fi.com/antop?hidefeed=true&widget=true"
                   target="_blank"
                   rel="noopener noreferrer"
                   class="flex items-center gap-1 px-2 text-zinc-400 hover:text-white transition-colors text-sm">
                    <i class="fa-solid fa-mug-hot"></i>
                    <span class="nav-label">Donate</span>
                </a>
            </div>
        </div>
    </header>

    <!-- Main -->
    <main class="max-w-screen-xl mx-auto px-6 py-8">

<div id="grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
            <a th:each="site : ${sites}"
               th:href="${site.url}"
               target="_blank"
               rel="noopener noreferrer"
               class="site-card group block bg-zinc-900 rounded-xl overflow-hidden border border-zinc-800 hover:border-zinc-600 hover:shadow-2xl hover:shadow-black/50 transition-all duration-200"
               th:data-name="${site.name != null ? site.name.toLowerCase() : ''}"
               th:data-url="${site.url.toLowerCase()}"
               th:data-description="${site.description != null ? site.description.toLowerCase() : ''}">

                <!-- Thumbnail -->
                <div class="relative aspect-video bg-zinc-800 overflow-hidden">
                    <img th:if="${site.thumbnailUuid != null}"
                         th:src="@{/thumbnail/{uuid}.png(uuid=${site.thumbnailUuid})}"
                         th:alt="${site.name}"
                         class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300">
                    <div th:if="${site.thumbnailUuid == null}"
                         class="w-full h-full flex items-center justify-center bg-gradient-to-br from-zinc-800 to-zinc-900">
                        <span class="text-5xl font-black text-zinc-600"
                              th:text="${site.name != null ? site.name.substring(0, 1).toUpperCase() : '?'}"></span>
                    </div>
                </div>

                <!-- Info -->
                <div class="p-4">
                    <h2 class="font-semibold text-white text-sm leading-tight flex items-center gap-1.5 min-w-0">
                        <img th:if="${site.icon != null}"
                             th:src="${site.icon}"
                             class="w-4 h-4 shrink-0 object-contain"
                             alt="">
                        <span class="truncate" th:text="${site.name ?: site.url}"></span>
                    </h2>
                    <p class="text-zinc-500 text-xs mt-1.5 truncate"
                       th:text="${site.url}"></p>
                    <p th:if="${site.description != null}"
                       class="text-zinc-400 text-xs mt-1.5 line-clamp-2 leading-relaxed"
                       th:text="${site.description}"></p>
                </div>

            </a>
        </div>

        <!-- Empty state -->
        <div id="empty" class="hidden text-center py-24">
            <p class="text-zinc-600 text-lg font-medium">검색 결과가 없습니다</p>
        </div>

    </main>

    <script>
        const search = document.getElementById('search');
        const cards = document.querySelectorAll('.site-card');
        const empty = document.getElementById('empty');
        search.addEventListener('input', () => {
            const q = search.value.trim().toLowerCase();
            let visible = 0;

            cards.forEach(card => {
                const name = card.dataset.name || '';
                const url = card.dataset.url || '';
                const description = card.dataset.description || '';
                const match = !q || name.includes(q) || url.includes(q) || description.includes(q);
                card.style.display = match ? '' : 'none';
                if (match) {
                    visible++;
                }
            });

            empty.classList.toggle('hidden', visible > 0 || cards.length === 0);
        });
    </script>

</body>
</html>
